<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FrameRelay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px;height:100vh;display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;flex-shrink:0}
.header h1{font-size:18px;font-weight:600}
#netStats{font-size:13px;color:#aaa;font-family:monospace}
#bar{text-align:center;padding:6px;font-size:13px;border-radius:8px;margin-bottom:4px;flex-shrink:0}
#bar.waiting{background:#2a2a3e;color:#aaa}
#bar.ok{background:#1a3a2e;color:#44ff44}
#bar.busy{background:#3a3a5e;color:#ffcc00}
#bar.err{background:#3a1a2e;color:#ff6666}
#err{color:#e94560;font-size:12px;text-align:center;padding:4px;display:none;flex-shrink:0}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0;padding:8px 0}
.box{position:relative;background:#16213e;border-radius:12px;overflow:hidden}
.box img,.box video{width:100%;height:100%;object-fit:cover;display:block}
.box .lbl{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:6px;font-size:13px}
.box .ph{color:#555;font-size:14px;padding:20px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#localVideo{transform:scaleX(-1)}
.controls{display:flex;justify-content:center;gap:16px;padding:16px 0;flex-shrink:0}
.controls button{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:20px;background:#16213e;color:#fff}
.controls button:hover{background:#0f3460}
.controls button.off,.controls button.hangup:hover{background:#e94560}
.controls button.hangup{background:#e94560;width:56px;height:56px}
#remoteAudio{display:none}
@media(max-width:600px){.grid{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>FrameRelay</h1>
<span id="netStats">⬆ -- ⬇ -- KB/s</span>
</div>
<div id="bar" class="waiting">启动中...</div>
<div id="err"></div>
<div class="grid">
<div class="box">
<video id="localVideo" autoplay muted playsinline></video>
<div class="lbl">我</div>
</div>
<div class="box">
<img id="remoteImg" style="display:none">
<video id="remoteVideo" autoplay playsinline style="display:none"></video>
<div class="ph" id="ph">等待对方加入...</div>
<div class="lbl">对方</div>
</div>
</div>
<div class="controls">
<button id="btnMic">🎤</button>
<button id="btnCam">📹</button>
<button class="hangup" id="btnHangup">📞</button>
</div>
<audio id="remoteAudio" autoplay></audio>
</div>

<canvas id="capCanvas" style="display:none"></canvas>

<script>
const $=id=>document.getElementById(id);
const LV=$('localVideo'), RI=$('remoteImg'), RV=$('remoteVideo'), PH=$('ph'), CV=$('capCanvas'), RA=$('remoteAudio');
const FPS=10;
let log=m=>console.log('FR:',m);
let bar=(t,txt)=>{$('bar').className=t;$('bar').textContent=txt};
let err=m=>{$('err').style.display='block';$('err').textContent='❌ '+m};

// ---- State ----
let ws, lstream, havePeer=false;
let capInterval=null, aRec=null, aMs=null, aSb=null, aQ=[];

// ---- Network stats ----
let upBytes=0, downBytes=0, lastUp=0, lastDown=0;
let statsInterval=null;
function trackUp(n){upBytes+=n}
function trackDown(n){downBytes+=n}
function startStats(){
  stopStats();
  statsInterval=setInterval(()=>{
    const up=(upBytes-lastUp)/1024, dn=(downBytes-lastDown)/1024;
    lastUp=upBytes; lastDown=downBytes;
    $('netStats').textContent=`⬆ ${up.toFixed(1)} ⬇ ${dn.toFixed(1)} KB/s`;
  },1000);
}
function stopStats(){if(statsInterval){clearInterval(statsInterval);statsInterval=null}}

// ---- Media ----
async function startMedia(){
  log('getMedia');
  try{
    lstream = await Promise.race([
      navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480}},audio:true}),
      new Promise((_,r)=>setTimeout(()=>r('timeout'),7000))
    ]);
  }catch(e){
    bar('err','摄像头/麦克风不可用，请检查权限');
    err('设备访问被拒绝');
    return false;
  }
  LV.srcObject = lstream;
  bar('waiting','已就绪');
  log('media OK');
  startStats();
  return true;
}

// ---- Sending: video via canvas, audio via MediaRecorder ----

// Helper: prepend type byte (1=audio, 2=video) and send
function sendBinary(typeByte, blob){
  if(!ws||ws.readyState!==WebSocket.OPEN) return;
  blob.arrayBuffer().then(buf=>{
    const prefix = new Uint8Array(1);
    prefix[0] = typeByte;
    const combined = new Uint8Array(1 + buf.byteLength);
    combined.set(prefix);
    combined.set(new Uint8Array(buf), 1);
    ws.send(combined.buffer);
    trackUp(combined.byteLength);
  }).catch(e=>log('send err:'+e.message));
}

function startSend(){
  // --- Video: canvas capture ---
  stopCap();
  const v = LV;
  const tryStart = ()=>{
    if(v.readyState < 2 || !v.videoWidth){ setTimeout(tryStart,200); return; }
    const maxW = 640;
    const scale = Math.min(maxW / v.videoWidth, 480 / v.videoHeight, 1);
    CV.width = Math.round(v.videoWidth * scale);
    CV.height = Math.round(v.videoHeight * scale);
    const ctx = CV.getContext('2d');
    capInterval = setInterval(()=>{
      try{
        ctx.drawImage(v,0,0,CV.width,CV.height);
        CV.toBlob(blob=>{
          if(blob&&blob.size>100) sendBinary(2, blob);
        },'image/jpeg',0.4);
      }catch(e){log('cap err:'+e.message)}
    },1000/FPS);
    log('video '+FPS+'fps '+CV.width+'x'+CV.height);
  };
  tryStart();

  // --- Audio: MediaRecorder ---
  if(aRec){aRec.stop();aRec=null}
  try{
    const aCodec = 'audio/webm;codecs=opus';
    if(typeof MediaRecorder!=='undefined' && MediaRecorder.isTypeSupported(aCodec)){
      aRec = new MediaRecorder(lstream, {mimeType:aCodec});
      aRec.ondataavailable = e => { if(e.data&&e.data.size>0) sendBinary(1, e.data); };
      aRec.start(100);
      log('audio '+aCodec);
    } else {
      log('audio codec not supported, trying fallback');
      aRec = new MediaRecorder(lstream, {mimeType:'audio/webm'});
      aRec.ondataavailable = e => { if(e.data&&e.data.size>0) sendBinary(1, e.data); };
      aRec.start(100);
      log('audio fallback');
    }
  } catch(e) {
    log('audio init fail: '+e.message);
  }
}

function stopSend(){
  stopCap();
  if(aRec){aRec.stop();aRec=null}
}

function stopCap(){
  if(capInterval){clearInterval(capInterval);capInterval=null}
}

// ---- Receiving ----
function feedAudio(data){
  if(!aSb){
    // Init audio MediaSource on first chunk
    try{
      aMs = new MediaSource();
      RA.src = URL.createObjectURL(aMs);
      aMs.onsourceopen = ()=>{
        try{
          aSb = aMs.addSourceBuffer('audio/webm;codecs=opus');
          aSb.mode = 'segments';
          aSb.onupdateend = ()=>{
            while(aQ.length && aSb && !aSb.updating){
              try{aSb.appendBuffer(aQ.shift())}catch(e){}
            }
            // Trim to 30s
            if(aSb && !aSb.updating && aSb.buffered.length){
              try{const e=aSb.buffered.end(aSb.buffered.length-1);if(e>30)aSb.remove(0,e-30)}catch(e2){}
            }
          };
          // Process queued
          while(aQ.length && aSb && !aSb.updating){
            try{aSb.appendBuffer(aQ.shift())}catch(e){}
          }
        }catch(e){log('audio sb:'+e.message)}
      };
    }catch(e){log('audio ms:'+e.message)}
  }
  if(aSb && !aSb.updating){
    try{aSb.appendBuffer(data)}catch(e){aQ.push(data)}
  } else {
    aQ.push(data);
  }
}

function showFrame(data){
  if(!havePeer) return;
  if(PH.style.display!=='none'){PH.style.display='none';RI.style.display='block';bar('ok','接收中')}
  const blob = new Blob([data],{type:'image/jpeg'});
  const url = URL.createObjectURL(blob);
  RI.src = url;
  setTimeout(()=>URL.revokeObjectURL(url),200);
}

// ---- WS ----
const WS_URL=(location.protocol==='https:'?'wss://':'ws://')+location.host;

function connect(){
  bar('busy','连接服务器...');
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';

  ws.onopen = ()=>{ log('WS OK'); bar('busy','获取设备...'); startMedia(); };
  ws.onclose = ()=>{ log('closed'); stopSend(); stopStats(); bar('err','断开'); setTimeout(connect,3000); };

  ws.onmessage = e=>{
    if(e.data instanceof ArrayBuffer){
      const buf = new Uint8Array(e.data);
      if(buf.length<2) return;
      const type = buf[0];
      const payload = e.data.slice(1);
      trackDown(e.data.byteLength);
      if(type===1) feedAudio(payload);   // audio
      else if(type===2) showFrame(payload); // video
      return;
    }
    try{
      const m = JSON.parse(e.data);
      switch(m.type){
        case 'init':
          havePeer = m.peers.length>0;
          if(havePeer){ bar('ok','对方已在线'); startSend(); }
          else bar('waiting','等待对方加入...');
          break;
        case 'peer-joined':
          if(!havePeer){ havePeer=true; bar('ok','对方已加入'); startSend(); }
          break;
        case 'peer-left':
          cleanupRemote();
          bar('waiting','等待对方加入...');
          break;
        case 'hangup':
          cleanupRemote();
          bar('waiting','已挂断');
          break;
        case 'room-full':
          err('聊天室已满（最多2人），请稍后再试');
          bar('err','聊天室已满');
          break;
      }
    }catch(e){err('消息错误:'+e.message)}
  };

  function cleanupRemote(){
    havePeer=false; stopSend();
    RI.style.display='none'; PH.style.display='block'; PH.textContent='等待对方加入...';
    if(aMs){try{aMs.endOfStream()}catch(e){}aMs=null}
    RA.src=''; aSb=null; aQ=[];
    $('netStats').textContent='⬆ -- ⬇ -- KB/s';
  }
}

// ---- Controls ----
let mOn=true,cOn=true;
$('btnMic').onclick=function(){
  mOn=!mOn;
  if(lstream)lstream.getAudioTracks().forEach(t=>t.enabled=mOn);
  this.className=mOn?'':'off';this.textContent=mOn?'🎤':'🔇';
};
$('btnCam').onclick=function(){
  cOn=!cOn;
  if(lstream)lstream.getVideoTracks().forEach(t=>t.enabled=cOn);
  this.className=cOn?'':'off';this.textContent=cOn?'📹':'🚫';
};
$('btnHangup').onclick=function(){
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'hangup'}));
  stopSend();
  RI.style.display='none';PH.style.display='block';PH.textContent='已挂断';
  bar('waiting','已挂断');
};

connect();
</script>
</body>
</html>
