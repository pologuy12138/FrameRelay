<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FrameRelay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px;height:100vh;display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;flex-shrink:0}
.header h1{font-size:18px;font-weight:600}
#netStats{font-size:13px;color:#aaa;font-family:monospace}
#bar{text-align:center;padding:6px;font-size:13px;border-radius:8px;margin-bottom:4px;flex-shrink:0}
#bar.waiting{background:#2a2a3e;color:#aaa}
#bar.ok{background:#1a3a2e;color:#44ff44}
#bar.busy{background:#3a3a5e;color:#ffcc00}
#bar.err{background:#3a1a2e;color:#ff6666}
#err{color:#e94560;font-size:12px;text-align:center;padding:4px;display:none}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0;padding:8px 0}
.box{position:relative;background:#16213e;border-radius:12px;overflow:hidden}
.box img,.box video{width:100%;height:100%;object-fit:cover;display:block}
.box .lbl{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:6px;font-size:13px}
.box .ph{color:#555;font-size:14px;padding:20px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#localVideo{transform:scaleX(-1)}
.controls{display:flex;justify-content:center;gap:16px;padding:16px 0;flex-shrink:0}
.controls button{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:20px;background:#16213e;color:#fff}
.controls button:hover{background:#0f3460}
.controls button.off,.controls button.hangup:hover{background:#e94560}
.controls button.hangup{background:#e94560;width:56px;height:56px}
@media(max-width:600px){.grid{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>FrameRelay</h1><span id="netStats">⬆ -- ⬇ -- KB/s</span></div>
<div id="bar" class="waiting">启动中...</div>
<div id="err"></div><div id="aDbg" style="font-size:11px;color:#888;text-align:center;flex-shrink:0"></div>
<div class="grid">
<div class="box"><video id="localVideo" autoplay muted playsinline></video><div class="lbl">我</div></div>
<div class="box">
<img id="remoteImg" style="display:none">
<div class="ph" id="ph">等待对方加入...</div>
<div class="lbl">对方</div>
</div>
</div>
<div class="controls">
<button id="btnMic">🎤</button>
<button id="btnCam">📹</button>
<button class="hangup" id="btnHangup">📞</button>
</div>
</div>
<canvas id="capCanvas" style="display:none"></canvas>
<script>
const $=id=>document.getElementById(id), LV=$('localVideo'), RI=$('remoteImg'), PH=$('ph'), CV=$('capCanvas');
const FPS=10;
let log=m=>console.log('FR:',m);
let bar=(t,txt)=>{$('bar').className=t;$('bar').textContent=txt};
let err=m=>{$('err').style.display='block';$('err').textContent='❌ '+m};

let ws, lstream, havePeer=false, capInterval=null, aRec=null;
let upB=0, downB=0, lastUp=0, lastDown=0, si=null;
function tu(n){upB+=n} function td(n){downB+=n}
function ss(){if(si)return;si=setInterval(()=>{$('netStats').textContent=`⬆ ${((upB-lastUp)/1024).toFixed(1)} ⬇ ${((downB-lastDown)/1024).toFixed(1)} KB/s`;lastUp=upB;lastDown=downB;updateDebug()},1000)}
function sx(){if(si){clearInterval(si);si=null}}

// ---- Media ----
async function startMedia(){
  try{
    lstream = await Promise.race([
      navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480}},audio:true}),
      new Promise((_,r)=>setTimeout(()=>r('timeout'),7000))
    ]);
  }catch(e){err('摄像头/麦克风不可用');return false}
  LV.srcObject = lstream;
  bar('waiting','已就绪');ss();return true;
}

// ---- Video (unchanged - canvas → ws.send blob) ----
function startCap(){
  stopCap();
  const go=()=>{
    if(LV.readyState<2||!LV.videoWidth){setTimeout(go,200);return}
    const s=Math.min(640/LV.videoWidth,480/LV.videoHeight,1);
    CV.width=Math.round(LV.videoWidth*s); CV.height=Math.round(LV.videoHeight*s);
    const ctx=CV.getContext('2d');
    capInterval=setInterval(()=>{
      if(!ws||ws.readyState!==WebSocket.OPEN)return;
      ctx.drawImage(LV,0,0,CV.width,CV.height);
      CV.toBlob(b=>{if(b&&b.size>100){ws.send(b);tu(b.size)}},'image/jpeg',0.4);
    },1000/FPS);
  };
  go();
}
function stopCap(){if(capInterval){clearInterval(capInterval);capInterval=null}}

// ---- Audio: PCM via Web Audio API (universal, no codec issues) ----
let aTx=0,aRx=0;
let aCtx=null, aProc=null, aStop=false;
let aNextT=0; // playback scheduling

// Sender: capture microphone → Int16 PCM → WS
function startAudio(){
  if(aProc)return;
  if(!lstream||!lstream.getAudioTracks||!lstream.getAudioTracks().length){
    setTimeout(startAudio,500);return;
  }
  try{
    aCtx=new AudioContext();
    if(aCtx.state==='suspended') aCtx.resume();
    const src=aCtx.createMediaStreamSource(lstream);
    aProc=aCtx.createScriptProcessor(2048,1,1); // 2048 samples mono
    aProc.onaudioprocess=e=>{
      if(aStop||!ws||ws.readyState!==WebSocket.OPEN)return;
      const input=e.inputBuffer.getChannelData(0);
      const pcm=new Int16Array(input.length);
      for(let i=0;i<input.length;i++) pcm[i]=Math.max(-32768,Math.min(32767,input[i]*32768));
      const c=new Uint8Array(1+pcm.buffer.byteLength);
      c[0]=1;c.set(new Uint8Array(pcm.buffer),1);
      ws.send(c.buffer);tu(c.byteLength);
      aTx++;
    };
    src.connect(aProc);
    // DON'T connect to destination (avoids mic feedback)
    log('audio PCM started @'+aCtx.sampleRate+'Hz');
  }catch(e){err('音频启动失败: '+e.message)}
}

function stopAudio(){
  aStop=true;
  if(aProc){aProc.disconnect();aProc=null}
  if(aCtx){aCtx.close();aCtx=null}
  aNextT=0;
}

// Receiver: Int16 PCM → AudioContext playback
function handleAudio(data){
  aRx++;
  try{
    if(!aCtx||aCtx.state==='closed'){
      aCtx=new AudioContext();
      aNextT=0;
      // Resume if suspended (autoplay policy)
      if(aCtx.state==='suspended') aCtx.resume();
    }
    const pcm=new Int16Array(data);
    const sr=aCtx.sampleRate;
    const buf=aCtx.createBuffer(1,pcm.length,sr);
    const ch=buf.getChannelData(0);
    for(let i=0;i<pcm.length;i++) ch[i]=pcm[i]/32768;
    const node=aCtx.createBufferSource();
    node.buffer=buf;
    node.connect(aCtx.destination);
    const now=aCtx.currentTime;
    if(aNextT<now+0.05) aNextT=now+0.05; // 50ms lookahead
    node.start(aNextT);
    aNextT+=pcm.length/sr;
  }catch(e){log('aErr:'+e.message)}
}

function updateDebug(){
  const info=document.getElementById('aDbg');
  if(!info)return;
  info.textContent='🎤Tx:'+aTx+' Rx:'+aRx;
}

function showFrame(data){
  td(data.byteLength);
  if(!havePeer)return;updateDebug();
  if(PH.style.display!=='none'){PH.style.display='none';RI.style.display='block';bar('ok','接收中')}
  const url=URL.createObjectURL(new Blob([data],{type:'image/jpeg'}));
  RI.src=url;setTimeout(()=>URL.revokeObjectURL(url),200);
}

// ---- WS ----
function connect(){
  bar('busy','连接服务器...');
  ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);
  ws.binaryType='arraybuffer';
  ws.onopen=()=>{log('WS OK');bar('busy','获取设备...');startMedia()};
  ws.onclose=()=>{log('closed');stopCap();stopAudio();sx();bar('err','断开');setTimeout(connect,3000)};
  ws.onmessage=e=>{
    if(e.data instanceof ArrayBuffer){
      td(e.data.byteLength);
      // First byte: 0x01 = audio, 0xFFD8 = JPEG video
      const first=new Uint8Array(e.data,0,1)[0];
      if(first===1) handleAudio(e.data.slice(1));
      else showFrame(e.data);
      return;
    }
    try{
      const m=JSON.parse(e.data);
      switch(m.type){
        case 'init':
          havePeer=m.peers.length>0;
          havePeer?bar('ok','对方已在线'):bar('waiting','等待对方加入...');
          if(havePeer){startCap();startAudio()}
          break;
        case 'peer-joined':
          if(!havePeer){havePeer=true;bar('ok','对方已加入');startCap();startAudio()}
          break;
        case 'peer-left': case 'hangup':
          havePeer=false;stopCap();stopAudio();
          RI.style.display='none';PH.style.display='block';PH.textContent='等待对方加入...';
          $('netStats').textContent='⬆ -- ⬇ -- KB/s';
          if(m.type==='hangup')PH.textContent='对方已挂断';
          break;
        case 'room-full':
          err('聊天室已满（最多2人）');
          bar('err','聊天室已满');
          break;
      }
    }catch(e){err('消息错误:'+e.message)}
  };
}

// ---- Controls ----
let mOn=true,cOn=true;
$('btnMic').onclick=function(){
  mOn=!mOn;
  if(lstream)lstream.getAudioTracks().forEach(t=>t.enabled=mOn);
  this.className=mOn?'':'off';this.textContent=mOn?'🎤':'🔇';
};
$('btnCam').onclick=function(){
  cOn=!cOn;
  if(lstream)lstream.getVideoTracks().forEach(t=>t.enabled=cOn);
  this.className=cOn?'':'off';this.textContent=cOn?'📹':'🚫';
};
$('btnHangup').onclick=function(){
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'hangup'}));
  stopCap();stopAudio();
  RI.style.display='none';PH.style.display='block';PH.textContent='已挂断';
  bar('waiting','已挂断');
};
connect();
</script>
</body>
</html>
